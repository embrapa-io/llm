worker_processes auto;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  # Upstream with keepalive for connection reuse
  upstream ollama_backend {
    server ollama:11434;
    keepalive 32;
  }

  server {
    listen 11434;

    # Security: block management endpoints
    location ~ ^/api/(pull|create|push|delete|copy) {
      return 403;
    }

    # API OpenAI-compatible → SGLang (GPU, Qwen3.6-35B-A3B-FP8).
    # Uma URL única para todos os clientes: a 11434 serve /v1 (GPU) e /api/*
    # (Ollama/embeddings). A porta 11435 (SGLang direto) fica para diagnóstico
    # e pode ser filtrada pelo firewall sem impacto nos clientes.
    # Resolver dinâmico do Docker: o nginx sobe mesmo com o serviço sglang
    # parado (ex.: rollback via profile vllm) — /v1 responde 502 e /api/*
    # continua funcionando. Para o rollback vLLM, trocar o upstream abaixo
    # para vllm:8000.
    location /v1/ {
      resolver 127.0.0.11 valid=30s;
      set $gpu_upstream sglang:30000;

      # Payloads grandes: imagens em base64 (visão) e contextos longos
      client_max_body_size 200M;

      # Prefill de contextos de 512K pode levar minutos
      proxy_connect_timeout 60s;
      proxy_send_timeout 900s;
      proxy_read_timeout 900s;

      # SSE/streaming (chat completions com stream=true)
      proxy_buffering off;
      proxy_cache off;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_pass http://$gpu_upstream;
    }

    # Health check endpoint
    location /health {
      proxy_pass http://ollama_backend/;
      proxy_connect_timeout 5s;
      proxy_read_timeout 5s;
    }

    # Main API endpoints
    location / {
      client_max_body_size 100M;

      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;

      # Buffering for non-streaming responses
      proxy_buffer_size 512k;
      proxy_buffers 16 512k;
      proxy_busy_buffers_size 1m;

      # HTTP/1.1 with keepalive
      proxy_http_version 1.1;
      proxy_set_header Connection "";

      # Headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_pass http://ollama_backend;
    }

    # Streaming endpoints (chat, generate) - disable buffering for SSE
    location ~ ^/api/(chat|generate) {
      client_max_body_size 100M;

      # Extended timeouts for streaming
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;

      # Disable buffering for Server-Sent Events
      proxy_buffering off;
      proxy_cache off;

      # HTTP/1.1 required for chunked transfer
      proxy_http_version 1.1;
      proxy_set_header Connection "";

      # Headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_pass http://ollama_backend;
    }

    # Embeddings endpoint - optimized for batch processing
    location /api/embed {
      client_max_body_size 100M;

      # Embeddings are usually faster
      proxy_connect_timeout 30s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;

      # Larger buffers for batch embeddings
      proxy_buffer_size 1m;
      proxy_buffers 16 1m;
      proxy_busy_buffers_size 2m;

      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_pass http://ollama_backend;
    }
  }
}
