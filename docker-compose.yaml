services:
  # Sob profile desde 10/07/2026: o boot travava com GPU a 100% até o timeout
  # de 600s do warmup. Causa provável IDÊNTICA à do vLLM (all-reduce custom
  # com GPUs em sockets/domínios PCI distintos — topologia SYS, sem P2P);
  # retestar no hp-gpu02 com NCCL_P2P_DISABLE=1 antes de descartar.
  # Subir com: docker compose stop vllm && docker compose --profile sglang up -d sglang
  sglang:
    profiles: [sglang]
    # Build local em cima da -runtime para repor deps Python faltantes
    # (sgl-project/sglang#29650) — ver Dockerfile.sglang.
    build:
      context: .
      dockerfile: Dockerfile.sglang
    image: embrapa-io/sglang:v0.5.14-runtime-fix
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 32gb
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=${SGLANG_NVIDIA_VISIBLE_DEVICES:-all}
      # GPUs em sockets distintos (topologia SYS, sem P2P) — P2P "aparente"
      # trava o primeiro coletivo do TP=2 com GPU a 100%.
      - NCCL_P2P_DISABLE=${NCCL_P2P_DISABLE:-1}
      # Exigido pelo SGLang para servir contexto acima do derivado do modelo
      # (262K no Qwen3.6) — usar junto com o override YaRN do .env.
      - SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN=${SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN:-0}
    volumes:
      - ${SGLANG_MODEL_PATH:?defina no .env (cp .env.example .env)}:/model:ro
      - sglang-cache:/root/.cache
    ports:
      - ${PORT_SGLANG:-11435}:30000
    command: >
      python3 -m sglang.launch_server
      --model-path /model
      --host 0.0.0.0
      --port 30000
      --tensor-parallel-size ${SGLANG_TP_SIZE:-2}
      --context-length ${SGLANG_CONTEXT_LENGTH:-262144}
      --max-running-requests ${SGLANG_MAX_RUNNING_REQUESTS:-8}
      --cuda-graph-max-bs ${SGLANG_CUDA_GRAPH_MAX_BS:-8}
      --mem-fraction-static ${SGLANG_MEM_FRACTION:-0.90}
      --served-model-name ${SGLANG_SERVED_MODEL_NAME:-qwen3.6-35b-a3b}
      --reasoning-parser ${SGLANG_REASONING_PARSER:-qwen3}
      --tool-call-parser ${SGLANG_TOOL_CALL_PARSER:-qwen3_coder}
      --schedule-policy lpm
      --enable-mixed-chunk
      --trust-remote-code
      ${SGLANG_EXTRA_ARGS:-}
    restart: unless-stopped

  # Engine padrão desde 10/07/2026 — validado na GTI (03/jul) com Qwen3.6.
  # Usa a mesma porta do sglang (profile) — os dois não podem rodar juntos.
  vllm:
    image: vllm/vllm-openai:v0.24.0-ubuntu2404
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: 32gb
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=${SGLANG_NVIDIA_VISIBLE_DEVICES:-all}
      - VLLM_SLEEP_WHEN_IDLE=1
      # GPUs em sockets distintos (topologia SYS, sem P2P): sem isso o NCCL
      # tenta P2P "aparente" e o boot trava no 1º coletivo (10/07/2026).
      - NCCL_P2P_DISABLE=${NCCL_P2P_DISABLE:-1}
    volumes:
      - ${SGLANG_MODEL_PATH:?defina no .env (cp .env.example .env)}:/model:ro
      - vllm-cache:/root/.cache
    ports:
      - ${PORT_SGLANG:-11435}:8000
    # A imagem já traz ENTRYPOINT que invoca o servidor — fixamos explícito e
    # o command carrega SÓ os argumentos (repetir "vllm serve" duplica a
    # invocação). Quantização FP8 é auto-detectada do config.json do modelo.
    entrypoint: ["vllm", "serve"]
    command: >
      /model
      --host 0.0.0.0
      --port 8000
      --served-model-name ${SGLANG_SERVED_MODEL_NAME:-qwen3.6-35b-a3b}
      --tensor-parallel-size ${SGLANG_TP_SIZE:-2}
      --max-model-len ${SGLANG_CONTEXT_LENGTH:-262144}
      --max-num-seqs ${SGLANG_MAX_RUNNING_REQUESTS:-8}
      --gpu-memory-utilization ${SGLANG_MEM_FRACTION:-0.90}
      --reasoning-parser qwen3
      --tool-call-parser qwen3_coder
      --enable-auto-tool-choice
      --disable-custom-all-reduce
      --trust-remote-code
      ${VLLM_EXTRA_ARGS:-}
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    environment:
      # Força execução em CPU (embeddings). GPUs ficam dedicadas ao SGLang.
      - CUDA_VISIBLE_DEVICES=
      - NVIDIA_VISIBLE_DEVICES=
      # Performance em CPU (2× Xeon 6730P Granite Rapids — 64 cores/128
      # threads, AMX acelera GEMM INT8/BF16 no llama.cpp)
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-16384}
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
      - OLLAMA_NEW_ENGINE=${OLLAMA_NEW_ENGINE:-1}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-8}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-4}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
      - OLLAMA_HOST=0.0.0.0:11434
      # Tuning OpenMP (AMX / NUMA dual-socket)
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-32}
      - OMP_PROC_BIND=${OMP_PROC_BIND:-close}
      - OMP_PLACES=${OMP_PLACES:-cores}
    volumes:
      - ${LLM_PATH:?defina no .env (cp .env.example .env)}:/root/.ollama
      - ./custom:/custom:ro
    expose:
      - 11434
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      # Porta padrão dos clientes — sem TLS por decisão arquitetural (intranet
      # do DC; ata GTI 03/07/2026). Terminação TLS futura fica no Kong.
      - ${PORT_HTTP:-80}:11434
      # Compatibilidade com o padrão do server da GTI durante a transição.
      - ${PORT_OLLAMA:-11434}:11434
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  sglang-cache:
  vllm-cache:

networks:
  default:
    name: llm
    external: true
